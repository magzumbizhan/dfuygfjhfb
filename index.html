<!DOCTYPE html>

    <title>CSS Animation Flow: Advanced</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="feed">
        <section class="task">
            <h2>08. Hover Card</h2>
            <div class="stage">
                <div class="hover-card">
                    <span>Card</span>
                </div>
            </div>
        </section>

        <section class="task">
            <h2>09. Typing Effect</h2>
            <div class="stage">
                <div class="typing-container">
                    <p class="typing-text">Hello, Junior!</p>
                </div>
            </div>
        </section>

        <section class="task">
            <h2>10. Dot Preloader</h2>
            <div class="stage">
                <div class="dot-loader">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
            </div>
        </section>
    </div>
